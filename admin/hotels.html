<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotels | Opal Haven Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
                <div class="sidebar-header">
                    <h2 class="text-center">Opal Haven</h2>
                    <p class="text-center text-muted">Admin Panel</p>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="hotels.html"><i class="bi bi-building"></i> Hotels</a></li>
                    <li class="nav-item"><a class="nav-link" href="rooms.html"><i class="bi bi-door-closed"></i> Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="bookings.html"><i class="bi bi-calendar-check"></i> Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people"></i> Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html"><i class="bi bi-star"></i> Reviews</a></li>
                    <li class="nav-item mt-5"><button class="nav-link btn btn-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button></li>
                </ul>
            </nav>

            <main class="col-md-9 col-lg-10 px-md-4 content">
                <div class="topbar d-flex justify-content-between align-items-center">
                    <h1>Hotels</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#hotelModal" onclick="resetHotelForm()">
                        <i class="bi bi-plus"></i> Add Hotel
                    </button>
                </div>

                <div id="alertContainer" class="mt-3"></div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">All Hotels</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0" id="hotelsTable">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>City</th>
                                    <th>Country</th>
                                    <th>Rating</th>
                                    <th>Rooms</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="7" class="text-center text-muted py-3">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="hotelModal" tabindex="-1" aria-labelledby="hotelModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="hotelModalTitle">Add Hotel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="hotelForm" onsubmit="event.preventDefault();">
                        <div class="mb-3">
                            <label class="form-label">Hotel Name</label>
                            <input type="text" id="hotelName" class="form-control" required />
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">City</label>
                                <input type="text" id="hotelCity" class="form-control" />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Country</label>
                                <input type="text" id="hotelCountry" class="form-control" />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" id="hotelAddress" class="form-control" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="hotelDescription" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Star Rating</label>
                                <input type="number" id="hotelRating" class="form-control" min="1" max="5" step="0.5" />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status</label>
                                <select id="hotelStatus" class="form-control">
                                    <option value="1">Active</option>
                                    <option value="0">Inactive</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amenities (comma-separated)</label>
                            <input type="text" id="hotelAmenities" class="form-control" placeholder="WiFi, Pool, Gym..." />
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveHotel()">Save Hotel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let currentHotelId = null;

        // Custom local alert handling injection fallback layer if global context missing
        function displayLocalAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const time = new Date().toLocaleTimeString();
            if (container) {
                container.innerHTML = `<div class="alert alert-${type} alert-dismissible show" role="alert">
                    <strong>[${time}]</strong> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>`;
                // Only auto-hide success messages
                if (type === 'success') {
                    setTimeout(() => { container.innerHTML = ''; }, 5000);
                }
            } else {
                alert(message);
            }
        }

        /**
         * READ - Read and Render Hotel List Rows Records cleanly
         */
        async function loadHotels() {
            try {
                const response = await apiRequest('/hotels', { method: 'GET', forceRefresh: true });
                console.log("Full Hotel API Response:", response);

                const tbody = document.querySelector('#hotelsTable tbody');
                if (!tbody) return;
                tbody.innerHTML = '';

                if (!response) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-3">Failed to load data metrics. Check authorization profiles.</td></tr>';
                    return;
                }

                // Handle both raw collection arrays or default Laravel structural Paginator results safely
                const hotelsArray = response.data || (Array.isArray(response) ? response : null);

                if (!hotelsArray || hotelsArray.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">No hotels found in database.</td></tr>';
                    return;
                }

                hotelsArray.forEach(hotel => {
                    const row = document.createElement('tr');
                    const statusBadge = hotel.is_active || hotel.is_active === 1
                        ? '<span class="badge bg-success">Active</span>' 
                        : '<span class="badge bg-danger">Inactive</span>';
                        
                    row.innerHTML = `
                        <td><strong>${hotel.name}</strong></td>
                        <td>${hotel.city || '-'}</td>
                        <td>${hotel.country || '-'}</td>
                        <td><i class="bi bi-star-fill text-warning"></i> ${hotel.star_rating || '-'}</td>
                        <td>${hotel.rooms_count || 0} Rooms</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-info me-1" onclick="editHotel(${hotel.id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteHotel(${hotel.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error("Renderer Failure:", err);
            }
        }

        /**
         * Reset Modal State Tracker Parameters Properties values cleanly
         */
        function resetHotelForm() {
            currentHotelId = null;
            const form = document.getElementById('hotelForm');
            if (form) form.reset();
            if (document.getElementById('hotelModalTitle')) {
                document.getElementById('hotelModalTitle').textContent = 'Add Hotel';
            }
            if (document.getElementById('hotelStatus')) {
                document.getElementById('hotelStatus').value = '1';
            }
        }

        /**
         * PREPARE UPDATE - Fetch Single Instance into form elements fields view indicators
         */
        async function editHotel(hotelId) {
            try {
                const hotel = await apiRequest(`/hotels/${hotelId}`, { method: 'GET', forceRefresh: true });
                if (!hotel) return;

                currentHotelId = hotel.id;
                document.getElementById('hotelName').value = hotel.name || '';
                document.getElementById('hotelCity').value = hotel.city || '';
                document.getElementById('hotelCountry').value = hotel.country || '';
                document.getElementById('hotelAddress').value = hotel.address || '';
                document.getElementById('hotelDescription').value = hotel.description || '';
                document.getElementById('hotelRating').value = hotel.star_rating || '';
                document.getElementById('hotelStatus').value = (hotel.is_active == 1 || hotel.is_active === true) ? '1' : '0';
                
                // Safe check handling for incoming amenities collection fields array formats
                const amenitiesList = Array.isArray(hotel.amenities) 
                    ? hotel.amenities 
                    : (typeof hotel.amenities === 'string' ? JSON.parse(hotel.amenities || '[]') : []);
                document.getElementById('hotelAmenities').value = amenitiesList.join(', ');

                document.getElementById('hotelModalTitle').textContent = 'Edit Hotel';
                const modalEl = document.getElementById('hotelModal');
                const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                modal.show();
            } catch (error) {
                console.error('Failed processing item edit lookup values state instance properties:', error);
            }
        }

        /**
         * C - CREATE & U - UPDATE Processing Form Submissions Pipeline Action
         */
        async function saveHotel() {
            try {
                const hotelNameInput = document.getElementById('hotelName');
                
                if (!hotelNameInput || !hotelNameInput.value.trim()) {
                    displayLocalAlert('Hotel name is required', 'warning');
                    if (hotelNameInput) hotelNameInput.focus();
                    return;
                }

                const amenitiesStr = document.getElementById('hotelAmenities').value;
                const amenities = amenitiesStr ? amenitiesStr.split(',').map(a => a.trim()).filter(a => a) : [];

                // Format fields data layout parameters
                const dataPayload = {
                    name: hotelNameInput.value.trim(),
                    city: document.getElementById('hotelCity').value.trim(),
                    country: document.getElementById('hotelCountry').value.trim(),
                    address: document.getElementById('hotelAddress').value.trim(),
                    description: document.getElementById('hotelDescription').value.trim(),
                    star_rating: document.getElementById('hotelRating').value ? parseFloat(document.getElementById('hotelRating').value) : null,
                    is_active: document.getElementById('hotelStatus').value === '1',
                    amenities: amenities
                };

                const endpoint = currentHotelId ? `/hotels/${currentHotelId}` : '/hotels';
                const method = currentHotelId ? 'PUT' : 'POST';

                // FIXED: Standardize parameters alignment to match the direct structure expected by your apiRequest layout method wrapper!
                const result = await apiRequest(endpoint, {
                    method: method,
                    body: JSON.stringify(dataPayload),
                });

                if (result) {
                    displayLocalAlert(result.message || (currentHotelId ? 'Hotel details entry saved cleanly.' : 'Hotel entry created successfully.'), 'success');
                    const modalEl = document.getElementById('hotelModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                    
                    resetHotelForm();
                    loadHotels();
                }
            } catch (error) {
                console.error('Save hotel error:', error);
                displayLocalAlert('An unexpected exception intercepted processing action execution: ' + error.message, 'danger');
            }
        }

        /**
         * D - DELETE - Remove instance from storage cleanly
         */
        async function deleteHotel(hotelId) {
            if (!confirm('Are you sure to want to delete this?')) return;

            const result = await apiRequest(`/hotels/${hotelId}`, { method: 'DELETE' });

            if (result) {
                displayLocalAlert('Hotel Delete.', 'success');
                loadHotels();
            } else {
                displayLocalAlert('Deletion action refused. Ensure permissions roles validation values.', 'danger');
            }
        }

        // Initialize viewport setup context execution sequences indices maps configurations
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof checkAdminAuth === 'function' && !checkAdminAuth()) return;
            loadHotels();
        });
    </script>
</body>
</html>
