<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviews | Opal Haven Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
            <div class="sidebar-header">
                <h2 class="text-center">Opal Haven</h2>
                <p class="text-center text-muted">Admin Panel</p>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="hotels.html"><i class="bi bi-building"></i> Hotels</a></li>
                <li class="nav-item"><a class="nav-link" href="rooms.html"><i class="bi bi-door-closed"></i> Rooms</a></li>
                <li class="nav-item"><a class="nav-link" href="bookings.html"><i class="bi bi-calendar-check"></i> Bookings</a></li>
                <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people"></i> Users</a></li>
                <li class="nav-item"><a class="nav-link active" href="reviews.html"><i class="bi bi-star"></i> Reviews</a></li>
                <li class="nav-item mt-5">
                    <button class="nav-link btn btn-link" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Main -->
        <main class="col-md-9 col-lg-10 px-md-4 content">
            <div class="topbar d-flex justify-content-between align-items-center">
                <h1>Reviews</h1>
                <span id="reviewCount" class="badge bg-primary fs-6">Loading…</span>
            </div>

            <div id="alertContainer" class="mt-2"></div>

            <!-- Filters -->
            <div class="card mt-3">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-4">
                            <select id="hotelFilter" class="form-select form-select-sm" onchange="loadReviews()">
                                <option value="">All Hotels</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select id="ratingFilter" class="form-select form-select-sm" onchange="loadReviews()">
                                <option value="">All Ratings</option>
                                <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                                <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                                <option value="3">⭐⭐⭐ 3 Stars</option>
                                <option value="2">⭐⭐ 2 Stars</option>
                                <option value="1">⭐ 1 Star</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select id="visibilityFilter" class="form-select form-select-sm" onchange="loadReviews()">
                                <option value="">All Visibility</option>
                                <option value="visible">Visible Only</option>
                                <option value="hidden">Hidden Only</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetFilters()">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card mt-3">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="reviewsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Hotel</th>
                                <th>Reviewer</th>
                                <th>Rating</th>
                                <th>Comment</th>
                                <th>Date</th>
                                <th>Visibility</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="8" class="text-center text-muted py-4">
                                    <div class="spinner-border spinner-border-sm me-2"></div>Loading reviews…
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
<script>
    // ─── Populate hotel filter dropdown ────────────────────────────────────
    async function loadHotelsForFilter() {
        // forceRefresh so the cache doesn't hide new data
        const data = await apiRequest('/hotels', { forceRefresh: true });
        if (!data || !data.data) return;

        const hotelFilter = document.getElementById('hotelFilter');
        hotelFilter.innerHTML = '<option value="">All Hotels</option>';
        data.data.forEach(h => {
            hotelFilter.innerHTML += `<option value="${h.id}">${h.name}</option>`;
        });
    }

    // ─── Stars helper ──────────────────────────────────────────────────────
    function starsHtml(rating) {
        const n = parseInt(rating) || 0;
        return '<span class="text-warning">' + '★'.repeat(n) + '☆'.repeat(Math.max(0, 5 - n)) + '</span> ' +
               `<small class="text-muted">(${n}/5)</small>`;
    }

    // ─── Format date ───────────────────────────────────────────────────────
    function niceDate(str) {
        if (!str) return '-';
        return new Date(str).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // ─── Main load function ────────────────────────────────────────────────
    async function loadReviews() {
        const tbody    = document.querySelector('#reviewsTable tbody');
        const countEl  = document.getElementById('reviewCount');
        const hotelId  = document.getElementById('hotelFilter').value;
        const rating   = document.getElementById('ratingFilter').value;
        const vis      = document.getElementById('visibilityFilter').value;

        tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm me-2"></div>Loading…</td></tr>`;

        // Build query params
        const params = new URLSearchParams();
        if (hotelId) params.set('hotel_id', hotelId);
        if (rating)  params.set('rating', rating);
        const qs = params.toString() ? '?' + params.toString() : '';

        // Single admin endpoint — returns all reviews with hotel + user eager-loaded
        const data = await apiRequest('/reviews' + qs, { forceRefresh: true });

        if (!data) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                Failed to load reviews. Check your token or backend.</td></tr>`;
            countEl.textContent = 'Error';
            return;
        }

        // Handle both paginated ({data:[]}) and plain array responses
        // Laravel paginate() returns { current_page, data: [], total, ... }
        let reviews = Array.isArray(data) ? data
                    : Array.isArray(data.data) ? data.data
                    : Array.isArray(data.data?.data) ? data.data.data
                    : [];

        // Client-side visibility filter — compare loosely because MySQL returns 1/0 not true/false
        if (vis === 'visible') reviews = reviews.filter(r => r.is_visible == 1);
        if (vis === 'hidden')  reviews = reviews.filter(r => r.is_visible == 0);

        countEl.textContent = reviews.length + ' review' + (reviews.length !== 1 ? 's' : '');

        if (reviews.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">
                <i class="bi bi-chat-square-text me-1"></i>No reviews match the selected filters.</td></tr>`;
            return;
        }

        tbody.innerHTML = '';
        reviews.forEach((review, i) => {
            const hotelName = review.hotel?.name || '—';
            const userName  = review.user?.name  || '—';
            const comment   = review.comment ? review.comment.substring(0, 80) + (review.comment.length > 80 ? '…' : '') : '—';
            const visBadge  = review.is_visible == 1
                ? '<span class="badge bg-success">Visible</span>'
                : '<span class="badge bg-secondary">Hidden</span>';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="text-muted small">${review.id}</td>
                <td><strong>${hotelName}</strong></td>
                <td>${userName}</td>
                <td>${starsHtml(review.rating)}</td>
                <td class="text-muted small" style="max-width:220px;">${comment}</td>
                <td class="small">${niceDate(review.created_at)}</td>
                <td>${visBadge}</td>
                <td>
                    <button class="btn btn-sm btn-outline-warning me-1"
                        onclick="toggleVisibility(${review.id})"
                        title="${review.is_visible == 1 ? 'Hide' : 'Show'} review">
                        <i class="bi bi-eye${review.is_visible == 1 ? '-slash' : ''}"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                        onclick="deleteReview(${review.id})"
                        title="Delete review">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // ─── Toggle visibility ─────────────────────────────────────────────────
    async function toggleVisibility(reviewId) {
        const result = await apiRequest(`/reviews/${reviewId}/toggle-visibility`, {
            method: 'PATCH',
        });
        if (result) {
            showAlert('Review visibility updated.', 'success');
            loadReviews();
        }
    }

    // ─── Delete review ─────────────────────────────────────────────────────
    async function deleteReview(reviewId) {
        if (!confirm('Permanently delete this review?')) return;
        const result = await apiRequest(`/reviews/${reviewId}`, { method: 'DELETE' });
        if (result) {
            showAlert('Review deleted.', 'success');
            loadReviews();
        }
    }

    // ─── Reset filters ──────────────────────────────────────────────────────
    function resetFilters() {
        document.getElementById('hotelFilter').value     = '';
        document.getElementById('ratingFilter').value    = '';
        document.getElementById('visibilityFilter').value = '';
        loadReviews();
    }

    // ─── Boot ──────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        if (!checkAdminAuth()) return;
        loadHotelsForFilter();
        loadReviews();
    });
</script>
</body>
</html>
