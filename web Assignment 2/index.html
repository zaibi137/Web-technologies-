<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.32/jspdf.plugin.autotable.min.js"></script>
    <style>
:root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
            --progress-bg: #e2e8f0;
            --progress-active: #3b82f6;
            --correct: #10b981;
            --incorrect: #ef4444;
            --border-color: #cbd5e1;
            --gradient-correct: linear-gradient(135deg, #10b981, #34d399);
            --gradient-incorrect: linear-gradient(135deg, #ef4444, #f87171);
        }
        body.dark-mode {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --progress-bg: #334155;
            --progress-active: #60a5fa;
            --border-color: #475569;
            --gradient-correct: linear-gradient(135deg, #059669, #10b981);
            --gradient-incorrect: linear-gradient(135deg, #dc2626, #ef4444);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .progress-segment {
            height: 20px;
            background-color: var(--progress-bg);
            border-radius: 10px;
            margin: 2px;
            transition: all 0.3s ease;
        }
        .segment-pending { background-color: var(--progress-bg); }
        .segment-active { background-color: var(--progress-active); }
        .segment-completed { background: var(--gradient-correct); }
        .quiz-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            color: var(--text-color);
        }
        .dark-mode .quiz-card,
        .dark-mode .table,
        .dark-mode .form-check-label,
        .dark-mode h1, .dark-mode h2, .dark-mode h3, .dark-mode h4 {
            color: var(--text-color) !important;
        }
        .dark-mode .table {
            --bs-table-color: var(--text-color);
            --bs-table-bg: var(--card-bg);
        }
        .option {
            color: var(--text-color);
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: transparent;
        }
        .dark-mode .option {
            background-color: var(--card-bg);
        }
        .option:hover {
            background-color: rgba(0,0,0,0.1);
        }
        .dark-mode .option:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .option.correct {
            background-color: var(--correct) !important;
            color: white !important;
            border: 2px solid #146c43 !important;
        }
        .option.incorrect {
            background-color: var(--incorrect) !important;
            color: white !important;
            border: 2px solid #a71e2a !important;
        }
        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--progress-active) !important;
        }
        .dark-mode .badge {
            color: white !important;
        }
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        @media (max-width: 768px) {
            .progress-container { flex-direction: column; }
            .progress-segment { width: 100%; height: 15px; }
        }
    </style>
</head>
<body>
    <button class="btn btn-outline-secondary mode-toggle" id="modeToggle" title="Toggle Dark/Light Mode">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="container mt-5 pt-5">
        <h1 class="text-center mb-4">Interactive Quiz</h1>
        
        <!-- Progress Bar -->
        <div class="progress-container d-flex justify-content-center mb-4" id="progressContainer">
            <!-- Segments added by JS -->
        </div>
        
        <div id="quizContainer">
            <div class="card quiz-card mx-auto" style="max-width: 600px;">
                <div class="card-body text-center">
                    <div class="timer text-warning mb-3" id="timer">30</div>
                    <h3 id="question"></h3>
                    <div id="options" class="mt-4"></div>
                    <button class="btn btn-primary mt-3" id="submitBtn" style="display:none;">Submit Answer</button>
                </div>
            </div>
        </div>
        
        <div id="resultsContainer" style="display:none;">
            <div class="card quiz-card mx-auto mt-4" style="max-width: 600px;">
                <div class="card-body">
                    <h2 class="text-center">Quiz Complete!</h2>
                    <h3 id="score" class="text-center mb-4"></h3>
                    <h4 class="text-center mb-3">Detailed Results</h4>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Question</th>
                                    <th>Your Answer</th>
                                    <th>Correct Answer</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                    <button class="btn btn-success mt-3" id="downloadPdf"><i class="fas fa-download"></i> Download PDF</button>
                    <button class="btn btn-secondary ms-2" onclick="restartQuiz()">Restart Quiz</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Delay jsPDF destructuring until libraries load
        window.addEventListener('load', () => {
            if (window.jspdf && window.jspdf.jsPDF) {
                window.jsPDFLib = window.jspdf.jsPDF;
            }
        });
        
        // Questions data (6 questions for randomization)
        const questions = [
            {
                q: "What is the capital of France?",
                options: ["London", "Berlin", "Paris", "Madrid"],
                correct: 2
            },
            {
                q: "Which planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Saturn"],
                correct: 1
            },
            {
                q: "What is 2 + 2?",
                options: ["3", "4", "5", "6"],
                correct: 1
            },
            {
                q: "Who wrote 'Romeo and Juliet'?",
                options: ["Dickens", "Shakespeare", "Tolstoy", "Hemingway"],
                correct: 1
            },
            {
                q: "What is the largest ocean on Earth?",
                options: ["Atlantic", "Indian", "Arctic", "Pacific"],
                correct: 3
            },
            {
                q: "Which element has the symbol 'O'?",
                options: ["Gold", "Oxygen", "Osmium", "Oganesson"],
                correct: 1
            }
        ];
        
        let shuffledQuestions = [];
        let currentQ = 0;
        let score = 0;
        let timeLeft = 30;
        let timerInterval;
        let selectedOption = -1;
        let userAnswers = [];
        let numQuestions = 5;
        
        const modeToggle = document.getElementById('modeToggle');
        const submitBtn = document.getElementById('submitBtn');
        
        // Shuffle
        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        // Load quiz
        function loadQuiz() {
            shuffledQuestions = shuffle(questions).slice(0, numQuestions);
            userAnswers = new Array(numQuestions).fill(-1);
            currentQ = 0;
            score = 0;
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';
            nextQuestion();
        }
        
        // Next question
        function nextQuestion() {
            clearInterval(timerInterval);
            timeLeft = 30;
            selectedOption = -1;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('submitBtn').style.display = 'none';
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
            
            const qData = shuffledQuestions[currentQ];
            document.getElementById('question').textContent = qData.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            qData.options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'option form-check mt-2 px-3 py-2 border rounded';
                div.innerHTML = `<input class="form-check-input" type="radio" name="opt" id="opt${index}" value="${index}">
                                 <label class="form-check-label w-100 p-2" for="opt${index}">${opt}</label>`;
                div.addEventListener('click', () => selectOption(index));
                optionsDiv.appendChild(div);
            });
            
            updateProgress();
            startTimer();
        }
        
        // Select
        function selectOption(index) {
            selectedOption = index;
            document.querySelectorAll('input[name="opt"]').forEach((input, i) => input.checked = i === index);
            submitBtn.style.display = 'block';
        }
        
        // Timer
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(false);
                }
            }, 1000);
        }
        
        // Save answer & check
        function checkAnswer(isCorrect) {
            userAnswers[currentQ] = selectedOption;
            clearInterval(timerInterval);
            
            const qData = shuffledQuestions[currentQ];
            const correctDiv = document.querySelectorAll('.option')[qData.correct];
            const selectedDiv = selectedOption >= 0 ? document.querySelectorAll('.option')[selectedOption] : null;
            
            correctDiv.classList.add('correct');
            if (selectedOption >= 0 && !isCorrect) selectedDiv.classList.add('incorrect');
            
            setTimeout(() => {
                currentQ++;
                if (currentQ < numQuestions) {
                    nextQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }
        
        // Submit click
        submitBtn.addEventListener('click', () => {
            const isCorrect = selectedOption === shuffledQuestions[currentQ].correct;
            if (isCorrect) score++;
            checkAnswer(isCorrect);
        });
        
        // Progress
        function updateProgress() {
            const container = document.getElementById('progressContainer');
            container.innerHTML = '';
            for (let i = 0; i < numQuestions; i++) {
                const segment = document.createElement('div');
                segment.className = 'progress-segment flex-grow-1 flex-shrink-0';
                if (i < currentQ) segment.classList.add('segment-completed');
                else if (i === currentQ) segment.classList.add('segment-active');
                else segment.classList.add('segment-pending');
                container.appendChild(segment);
            }
        }
        
        // Results
        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            const percentage = Math.round((score / numQuestions) * 100);
            document.getElementById('score').innerHTML = `Your Score: ${score}/${numQuestions} (${percentage}%)`;
            
            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '';
            shuffledQuestions.forEach((q, i) => {
                const userIdx = userAnswers[i];
                const userAns = userIdx >= 0 ? q.options[userIdx] : 'Timeout';
                const correctAns = q.options[q.correct];
                const statusClass = (userIdx === q.correct) ? 'bg-success' : 'bg-danger';
                const statusText = (userIdx === q.correct) ? 'Correct' : 'Incorrect';
                
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td>${q.q}</td>
                    <td>${userAns}</td>
                    <td>${correctAns}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                `;
            });
            
            document.getElementById('resultsContainer').style.display = 'block';
        }
        
// PDF with Table Format - Robust with error handling
        document.getElementById('downloadPdf').addEventListener('click', () => {
            try {
                console.log('PDF download clicked. jsPDF available:', !!window.jsPDFLib);
                if (!window.jsPDFLib) {
                    throw new Error('jsPDF library not loaded. Try refreshing the page.');
                }
                const doc = new window.jsPDFLib();
                
                // Title and Score
                doc.setFontSize(22);
                doc.text('Quiz Results', 14, 22);
                doc.setFontSize(16);
                doc.text(`Score: ${score}/${numQuestions} (${Math.round((score / numQuestions) * 100)}%)`, 14, 40);
                
                // Prepare table data
                const tableColumn = ['#', 'Question', 'Your Answer', 'Correct Answer', 'Status'];
                const tableRows = [];
                shuffledQuestions.forEach((q, i) => {
                    const userIdx = userAnswers[i];
                    const userAns = userIdx >= 0 ? q.options[userIdx] : 'Timeout';
                    const correctAns = q.options[q.correct];
                    const status = userIdx === q.correct ? 'Correct' : 'Incorrect';
                    tableRows.push([
                        i + 1,
                        q.q.length > 35 ? q.q.substring(0, 35) + '...' : q.q,
                        userAns,
                        correctAns,
                        status
                    ]);
                });
                
                // Check if autoTable available
                if (typeof doc.autoTable === 'function') {
                    doc.autoTable({
                        head: [tableColumn],
                        body: tableRows,
                        startY: 55,
                        theme: 'grid',
                        headStyles: { fillColor: [52, 152, 219], textColor: 255, fontSize: 12, fontStyle: 'bold' },
                        alternateRowStyles: { fillColor: [245, 245, 245] },
                        columnStyles: { 
                            0: { halign: 'center', cellWidth: 10 }, 
                            1: { cellWidth: 60 },
                            2: { cellWidth: 30 },
                            3: { cellWidth: 30 },
                            4: { halign: 'center', cellWidth: 20, fillColor: [173, 216, 230] } // Light blue for status column
                        },
                        styles: { fontSize: 10, cellPadding: 5, lineColor: [200, 200, 200], lineWidth: 0.1 },
                        bodyStyles: { 
                            alternateRowStyles: { fillColor: [248, 249, 250] },
                            rowStyles: { fillColor: [255, 255, 255] }
                        },
                        rowStyles: function(rowData, rowIndex) {
                            if (rowData.item.status === 'Correct') {
                                return { fillColor: [144, 238, 144] }; // Light green
                            } else {
                                return { fillColor: [255, 182, 193] }; // Light red
                            }
                        },
                        margin: { left: 14, right: 14 }
                    });
                } else {
                    console.warn('autoTable not available, using text fallback');
                    let y = 55;
                    tableRows.forEach((row, i) => {
                        doc.setFontSize(10);
                        doc.text(row.join(' | '), 14, y);
                        y += 8;
                        if (y > 280) {
                            doc.addPage();
                            y = 20;
                        }
                    });
                }
                
                doc.save('quiz-results.pdf');
                console.log('PDF saved successfully');
            } catch (error) {
                console.error('PDF error:', error);
                alert('PDF generation failed. Check console (F12) for details.');
            }
        });
        
        // Toggle mode
        modeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = modeToggle.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });
        
        // Restart
        function restartQuiz() {
            loadQuiz();
        }
        
        // Init
        loadQuiz();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
