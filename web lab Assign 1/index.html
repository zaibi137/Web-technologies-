<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Generator - Create Your Professional Resume</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="bg-primary text-white py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-0"><i class="fas fa-file-alt me-2"></i>CV Generator</h1>
                    <p class="mb-0 opacity-75">Create your professional resume in minutes</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <button class="btn btn-light btn-sm" onclick="loadSampleData()">
                        <i class="fas fa-magic me-1"></i>Load Sample Data
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container my-4">
        <div class="row">
            <!-- Form Section -->
            <div class="col-lg-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-edit me-2 text-primary"></i>Enter Your Information</h5>
                    </div>
                    <div class="card-body">
                        <!-- Template Selection -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Select Template</label>
                            <div class="template-selector">
                                <div class="template-option active" data-template="modern" onclick="selectTemplate('modern')">
                                    <div class="template-preview modern-preview"></div>
                                    <span>Modern</span>
                                </div>
                                <div class="template-option" data-template="classic" onclick="selectTemplate('classic')">
                                    <div class="template-preview classic-preview"></div>
                                    <span>Classic</span>
                                </div>
                                <div class="template-option" data-template="creative" onclick="selectTemplate('creative')">
                                    <div class="template-preview creative-preview"></div>
                                    <span>Creative</span>
                                </div>
                            </div>
                        </div>

                        <!-- Nav tabs -->
                        <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="personal-tab" data-bs-toggle="pill" data-bs-target="#personal" type="button">
                                    <i class="fas fa-user d-none d-sm-inline me-1"></i>Personal
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="education-tab" data-bs-toggle="pill" data-bs-target="#education" type="button">
                                    <i class="fas fa-graduation-cap d-none d-sm-inline me-1"></i>Education
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="experience-tab" data-bs-toggle="pill" data-bs-target="#experience" type="button">
                                    <i class="fas fa-briefcase d-none d-sm-inline me-1"></i>Experience
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="skills-tab" data-bs-toggle="pill" data-bs-target="#skills" type="button">
                                    <i class="fas fa-cogs d-none d-sm-inline me-1"></i>Skills
                                </button>
                            </li>
                        </ul>

                        <!-- Tab content -->
                        <div class="tab-content" id="pills-tabContent">
                            <!-- Personal Information -->
                            <div class="tab-pane fade show active" id="personal">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <div class="mb-2">
                                            <label class="form-label small">First Name *</label>
                                            <input type="text" class="form-control form-control-sm" id="firstName" placeholder="John">
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="mb-2">
                                            <label class="form-label small">Last Name *</label>
                                            <input type="text" class="form-control form-control-sm" id="lastName" placeholder="Doe">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-2">
                                            <label class="form-label small">Job Title</label>
                                            <input type="text" class="form-control form-control-sm" id="jobTitle" placeholder="Software Engineer">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-2">
                                            <label class="form-label small">Email *</label>
                                            <input type="email" class="form-control form-control-sm" id="email" placeholder="john.doe@email.com">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-2">
                                            <label class="form-label small">Phone</label>
                                            <input type="tel" class="form-control form-control-sm" id="phone" placeholder="+1 234 567 8900">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-2">
                                            <label class="form-label small">Address</label>
                                            <input type="text" class="form-control form-control-sm" id="address" placeholder="City, Country">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-2">
                                            <label class="form-label small">LinkedIn</label>
                                            <input type="url" class="form-control form-control-sm" id="linkedin" placeholder="https://linkedin.com/in/johndoe">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-2">
                                            <label class="form-label small">Professional Summary</label>
                                            <textarea class="form-control form-control-sm" id="summary" rows="3" placeholder="Brief summary of your professional background..."></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Education -->
                            <div class="tab-pane fade" id="education">
                                <div id="educationFields">
                                    <div class="education-entry border rounded p-3 mb-2">
                                        <div class="row g-2">
                                            <div class="col-12">
                                                <label class="form-label small">Degree</label>
                                                <input type="text" class="form-control form-control-sm edu-degree" placeholder="Bachelor of Science in Computer Science">
                                            </div>
                                            <div class="col-8">
                                                <label class="form-label small">Institution</label>
                                                <input type="text" class="form-control form-control-sm edu-institution" placeholder="University Name">
                                            </div>
                                            <div class="col-4">
                                                <label class="form-label small">Year</label>
                                                <input type="text" class="form-control form-control-sm edu-year" placeholder="2020">
                                            </div>
                                            <div class="col-12">
                                                <label class="form-label small">Description</label>
                                                <textarea class="form-control form-control-sm edu-description" rows="2" placeholder="Relevant achievements..."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-outline-primary btn-sm w-100" onclick="addEducationField()">
                                    <i class="fas fa-plus me-1"></i>Add Education
                                </button>
                            </div>

                            <!-- Work Experience -->
                            <div class="tab-pane fade" id="experience">
                                <div id="experienceFields">
                                    <div class="experience-entry border rounded p-3 mb-2">
                                        <div class="row g-2">
                                            <div class="col-12">
                                                <label class="form-label small">Job Title</label>
                                                <input type="text" class="form-control form-control-sm exp-title" placeholder="Software Developer">
                                            </div>
                                            <div class="col-8">
                                                <label class="form-label small">Company</label>
                                                <input type="text" class="form-control form-control-sm exp-company" placeholder="Company Name">
                                            </div>
                                            <div class="col-4">
                                                <label class="form-label small">Duration</label>
                                                <input type="text" class="form-control form-control-sm exp-duration" placeholder="2020-Present">
                                            </div>
                                            <div class="col-12">
                                                <label class="form-label small">Description</label>
                                                <textarea class="form-control form-control-sm exp-description" rows="3" placeholder="Describe your responsibilities and achievements..."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-outline-primary btn-sm w-100" onclick="addExperienceField()">
                                    <i class="fas fa-plus me-1"></i>Add Experience
                                </button>
                            </div>

                            <!-- Skills -->
                            <div class="tab-pane fade" id="skills">
                                <div class="mb-3">
                                    <label class="form-label small">Add your skills (press Enter after each skill)</label>
                                    <div class="input-group input-group-sm">
                                        <input type="text" class="form-control" id="skillInput" placeholder="e.g., JavaScript, Python, React">
                                        <button class="btn btn-primary" type="button" onclick="addSkill()">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                </div>
                                <div id="skillsList" class="d-flex flex-wrap gap-2 mb-3">
                                    <!-- Skills will be added here -->
                                </div>
                                <div class="text-center text-muted small">
                                    <i class="fas fa-info-circle me-1"></i>Click on a skill to remove it
                                </div>
                            </div>
                        </div>

                        <!-- Generate Button -->
                        <div class="d-grid gap-2 mt-4">
                            <button class="btn btn-primary btn-lg" onclick="generateCV()">
                                <i class="fas fa-sync-alt me-2"></i>Generate CV
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-eye me-2 text-primary"></i>Live Preview</h5>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary" onclick="zoomPreview(-0.1)">
                                <i class="fas fa-minus"></i>
                            </button>
                            <button class="btn btn-outline-secondary" onclick="zoomPreview(0.1)">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button class="btn btn-outline-primary" onclick="downloadPDF()">
                                <i class="fas fa-download me-1"></i>Download PDF
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="preview-container">
                            <div id="cvPreview" class="cv-preview modern">
                                <!-- CV Preview Content -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-auto">
        <div class="container text-center">
            <p class="text-muted mb-0">CV Generator &copy; 2024 - Create Professional Resumes Easily</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
