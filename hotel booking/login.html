<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Opal Haven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background: radial-gradient(circle at top, rgba(245, 214, 128, 0.12), transparent 30%), linear-gradient(180deg, #020617, #0b1224); }
      .glass-panel { background: rgba(15, 23, 42, 0.82); backdrop-filter: blur(20px); }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <header class="sticky top-0 z-50 border-b border-slate-700/60 bg-slate-950/95 backdrop-blur-xl">
      <nav class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
        <a href="index.html" class="text-2xl font-bold uppercase tracking-[0.36em] text-amber-200">Opal Haven</a>
        <div class="hidden items-center gap-4 md:flex">
          <a href="index.html" class="text-sm text-slate-200 transition hover:text-white">Home</a>
          <a href="rooms.html" class="text-sm text-slate-200 transition hover:text-white">Rooms</a>
          <a href="checkout.html" class="text-sm text-slate-200 transition hover:text-white">Checkout</a>
          <a id="dashboard-link" href="dashboard.html" class="hidden text-sm text-slate-200 transition hover:text-white">My Bookings</a>
        </div>
        <div class="hidden items-center gap-3 md:flex">
          <span id="nav-user-welcome" class="hidden rounded-full bg-slate-900/80 px-4 py-2 text-sm text-slate-200"></span>
          <a id="login-link" href="login.html" class="text-sm text-slate-200 transition hover:text-white">Login</a>
          <a id="signup-link" href="signup.html" class="rounded-full border border-amber-300 px-4 py-2 text-sm font-semibold text-amber-200 transition hover:bg-amber-200/10">Signup</a>
          <button id="logout-button" class="hidden rounded-full bg-amber-300 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-amber-200">Logout</button>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-lg px-6 py-20 lg:px-8">
      <section class="glass-panel rounded-[2.5rem] border border-slate-700/70 p-10 shadow-2xl shadow-slate-950/20">
        <div class="space-y-4">
          <p class="text-sm uppercase tracking-[0.32em] text-amber-200">Secure login</p>
          <h1 class="text-4xl font-semibold text-white">Access your Opal Haven account.</h1>
          <p class="text-slate-400">Log in to manage bookings, view reservations, and confirm your stay.</p>
        </div>

        <form id="login-form" class="mt-10 space-y-6">
          <label class="block text-sm font-semibold text-slate-200">
            Email address
            <input id="login-email" type="email" placeholder="name@example.com" class="mt-3 w-full rounded-3xl border border-slate-700 bg-slate-950/80 px-5 py-4 text-slate-100 outline-none ring-1 ring-slate-700 transition focus:ring-amber-300" required />
          </label>
          <label class="block text-sm font-semibold text-slate-200">
            Password
            <input id="login-password" type="password" placeholder="" class="mt-3 w-full rounded-3xl border border-slate-700 bg-slate-950/80 px-5 py-4 text-slate-100 outline-none ring-1 ring-slate-700 transition focus:ring-amber-300" required />
          </label>
          <button type="submit" class="w-full rounded-3xl bg-amber-400 px-6 py-4 text-sm font-semibold text-slate-950 shadow-lg shadow-amber-400/20 transition hover:bg-amber-300">Login</button>
        </form>

        <p class="mt-6 text-center text-slate-400">Need an account? <a href="signup.html" class="font-semibold text-amber-200 hover:text-white">Create one</a>.</p>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
